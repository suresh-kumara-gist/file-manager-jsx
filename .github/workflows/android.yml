name: Build Android APK (Simplified)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Create Capacitor app from scratch
      run: |
        # Create a fresh Capacitor project
        mkdir app
        cd app
        npm init -y
        npm install @capacitor/core @capacitor/android @capacitor/filesystem @capacitor/share @capacitor/toast
        npx cap init RedmiFileManager com.redmi.filemanager --web-dir=www
        npx cap add android
        
        # Create a simple index.html
        mkdir www
        echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>File Manager</title><style>body{margin:0;background:#0f1320;color:#fff;font-family:system-ui}</style></head><body><div id="root"></div><script>window.location.href="https://your-app-url.com";</script></body></html>' > www/index.html
        
        cd ..
        
        # Copy the React build if it exists
        if [ -d build ]; then
          cp -r build/* app/www/
        fi
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      run: |
        cd app/android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: file-manager-apk
        path: app/android/app/build/outputs/apk/debug/app-debug.apk