name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies (without lock file)
      run: |
        npm install --no-package-lock
        # OR use npm install instead of npm ci
        npm install
    
    - name: Build React app
      run: |
        npm run build
      env:
        CI: false
        DISABLE_ESLINT_PLUGIN: true
        SKIP_PREFLIGHT_CHECK: true
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Capacitor
      run: |
        npm install -g @capacitor/cli@5.0.0 @capacitor/android@5.0.0
        npx cap init RedmiFileManager com.redmi.filemanager --web-dir=build
    
    - name: Add Android platform
      run: |
        npx cap add android
      continue-on-error: true
    
    - name: Create AndroidManifest.xml
      run: |
        mkdir -p android/app/src/main
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.redmi.filemanager">
        
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />
            <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
            <uses-permission android:name="android.permission.BLUETOOTH" />
            <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
            <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
            <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
            <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
            <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
            <uses-permission android:name="android.permission.CAMERA" />
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
            <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
            <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
            <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
            
            <queries>
                <package android:name="com.whatsapp" />
                <package android:name="com.google.android.gm" />
                <package android:name="org.telegram.messenger" />
                <intent>
                    <action android:name="android.intent.action.SEND" />
                    <data android:mimeType="*/*" />
                </intent>
            </queries>

            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/AppTheme"
                android:requestLegacyExternalStorage="true"
                android:usesCleartextTraffic="true"
                android:largeHeap="true">
                
                <activity
                    android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                    android:name="com.redmi.filemanager.MainActivity"
                    android:label="@string/app_name"
                    android:theme="@style/AppTheme.NoActionBarLaunch"
                    android:launchMode="singleTask"
                    android:exported="true">
                    
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                    
                    <intent-filter>
                        <action android:name="android.intent.action.VIEW" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <data android:mimeType="*/*" />
                    </intent-filter>
                </activity>
                
                <provider
                    android:name="androidx.core.content.FileProvider"
                    android:authorities="${applicationId}.fileprovider"
                    android:exported="false"
                    android:grantUriPermissions="true">
                    <meta-data
                        android:name="android.support.FILE_PROVIDER_PATHS"
                        android:resource="@xml/file_paths" />
                </provider>
            </application>
        </manifest>
        EOF
    
    - name: Create file_paths.xml
      run: |
        mkdir -p android/app/src/main/res/xml
        cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <paths>
            <external-path name="external_files" path="." />
            <files-path name="files" path="." />
            <cache-path name="cache" path="." />
            <external-files-path name="external_app_files" path="." />
            <root-path name="root" path="/" />
        </paths>
        EOF
    
    - name: Create MainActivity
      run: |
        mkdir -p android/app/src/main/java/com/redmi/filemanager
        cat > android/app/src/main/java/com/redmi/filemanager/MainActivity.java << 'EOF'
        package com.redmi.filemanager;
        
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        import com.getcapacitor.BridgeActivity;
        
        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                // Enable webview settings
                WebView webView = new WebView(this);
                WebSettings webSettings = webView.getSettings();
                webSettings.setDomStorageEnabled(true);
                webSettings.setAllowFileAccess(true);
                webSettings.setAllowContentAccess(true);
            }
        }
        EOF
    
    - name: Create resources
      run: |
        mkdir -p android/app/src/main/res/values
        cat > android/app/src/main/res/values/strings.xml << 'EOF'
        <?xml version='1.0' encoding='utf-8'?>
        <resources>
            <string name="app_name">Redmi File Manager</string>
        </resources>
        EOF
        
        cat > android/app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                <item name="colorPrimary">#0f1320</item>
                <item name="colorPrimaryDark">#0a0d15</item>
                <item name="colorAccent">#4f8ef7</item>
            </style>
            
            <style name="AppTheme.NoActionBarLaunch" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowBackground">@color/backgroundColor</item>
            </style>
        </resources>
        EOF
        
        cat > android/app/src/main/res/values/colors.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <color name="colorPrimary">#0f1320</color>
            <color name="colorPrimaryDark">#0a0d15</color>
            <color name="colorAccent">#4f8ef7</color>
            <color name="backgroundColor">#0f1320</color>
        </resources>
        EOF
    
    - name: Create dummy icons
      run: |
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        # Create simple placeholder icons
        for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
          echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
            <background android:drawable="@color/colorPrimary"/>
            <foreground android:drawable="@drawable/ic_foreground"/>
          </adaptive-icon>' > android/app/src/main/res/$dir/ic_launcher.xml
        done
    
    - name: Copy web assets to Android
      run: npx cap copy android
    
    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > android/local.properties
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Clean build
      run: |
        cd android
        ./gradlew clean --no-daemon
      continue-on-error: true
    
    - name: Build Android APK (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: redmi-file-manager-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30
    
    - name: Build Android APK (Release)
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon --stacktrace
      continue-on-error: true
    
    - name: Upload Release APK (if exists)
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: redmi-file-manager-release
        path: android/app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn
        retention-days: 30